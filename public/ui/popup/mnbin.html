<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Sarabun', sans-serif;
    background: #000;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    min-height: 100vh;
  }

  .overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.5); /* สีเทาโปร่งแสง */
    display: flex;
    align-items: center; /* ให้ป๊อปอัพอยู่ด้านล่าง */
    justify-content: center;
    padding-bottom: 20px;
    z-index: 999;
  }

  .popup {
    background: #f0f0f0;
    border-radius: 18px;
    padding: 14px;
    display: flex;
    gap: 12px;
    align-items: center;
    cursor: default; /* ป้องกัน cursor pointer จาก overlay */
  }

  .btn-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    cursor: pointer;
  }

  .btn-icon {
    width: 80px;
    height: 80px;
    background: #5aaa5a;
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .btn-icon svg {
    width: 44px;
    height: 44px;
    fill: white;
  }

  .btn-label {
    font-family: 'Sarabun', sans-serif;
    font-size: 13px;
    color: #222;
    font-weight: 400;
    text-align: center;
  }
</style>

<div class="overlay" onclick="window.closePopup()">
  
  <div class="popup" onclick="event.stopPropagation()">

  <!-- เพิ่มคิวอาร์โค้ด -->
  <div class="btn-item">
    <div class="btn-icon">
      <svg viewBox="0 0 44 44" xmlns="http://www.w3.org/2000/svg">
        <rect x="20" y="6" width="4" height="32" rx="2"/>
        <rect x="6" y="20" width="32" height="4" rx="2"/>
      </svg>
    </div>
    <span class="btn-label">เพิ่มคิวอาร์โค้ด</span>
  </div>

  <!-- ยืนยันถัง -->
  <div class="btn-item">
    <div class="btn-icon">
      <svg viewBox="0 0 44 44" xmlns="http://www.w3.org/2000/svg">
        <rect x="4" y="4" width="13" height="13" rx="2" fill="none" stroke="white" stroke-width="3"/>
        <rect x="7" y="7" width="7" height="7" rx="1"/>
        <rect x="27" y="4" width="13" height="13" rx="2" fill="none" stroke="white" stroke-width="3"/>
        <rect x="30" y="7" width="7" height="7" rx="1"/>
        <rect x="4" y="27" width="13" height="13" rx="2" fill="none" stroke="white" stroke-width="3"/>
        <rect x="7" y="30" width="7" height="7" rx="1"/>
        <rect x="27" y="27" width="7" height="7" rx="1"/>
        <rect x="37" y="27" width="3" height="3" rx="0.5"/>
        <rect x="27" y="37" width="3" height="3" rx="0.5"/>
        <rect x="32" y="32" width="5" height="5" rx="0.5"/>
        <rect x="37" y="32" width="3" height="5" rx="0.5"/>
        <rect x="32" y="37" width="5" height="3" rx="0.5"/>
      </svg>
    </div>
    <span class="btn-label">ยืนยันถัง</span>
  </div>

  <!-- แดชบอร์ด -->
  <div class="btn-item">
    <div class="btn-icon">
      <svg viewBox="0 0 44 44" xmlns="http://www.w3.org/2000/svg">
        <path d="M6 10 L6 34 L22 38 L38 34 L38 10 L22 6 Z"
              fill="none" stroke="white" stroke-width="2.5" stroke-linejoin="round"/>
        <line x1="22" y1="6" x2="22" y2="38" stroke="white" stroke-width="2.5"/>
        <line x1="6" y1="18" x2="38" y2="18" stroke="white" stroke-width="2"/>
        <circle cx="33" cy="31" r="8" fill="#5aaa5a" stroke="white" stroke-width="2.2"/>
        <circle cx="33" cy="31" r="4" fill="none" stroke="white" stroke-width="2"/>
        <line x1="39" y1="37" x2="42" y2="40" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
      </svg>
    </div>
    <span class="btn-label">แดชบอร์ด</span>
  </div>

</div>
</div>

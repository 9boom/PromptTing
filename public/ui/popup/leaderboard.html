<style>
*{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Sarabun',sans-serif;background:#1a1a1a;min-height:100vh;display:flex;align-items:center;justify-content:center;}
  .leaderboard-popup{background:#f0f0f0;border-radius:20px;width:340px;overflow:hidden;position:relative;}
  .popup-body{padding:20px 16px 16px;}
  .header{display:flex;align-items:center;gap:10px;margin-bottom:20px;}
  .bar-icon{display:flex;align-items:flex-end;gap:3px;height:28px;}
  .bar-icon span{background:#2e7d32;border-radius:2px;display:block;}
  .bar-icon span:nth-child(1){width:7px;height:14px;}
  .bar-icon span:nth-child(2){width:7px;height:22px;}
  .bar-icon span:nth-child(3){width:7px;height:10px;}
  .header h2{font-size:20px;font-weight:700;color:#222;}
  .close-btn{position:absolute;top:12px;right:12px;width:38px;height:38px;background:#e53935;border:none;border-radius:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
  .close-btn svg{width:18px;height:18px;stroke:#fff;stroke-width:2.5;fill:none;}
  .list{display:flex;flex-direction:column;gap:8px;}
  .row{background:#e8e8e8;border-radius:12px;display:flex;align-items:center;padding:10px 12px;gap:10px;}
  .row.active{background:#d0d0d0;border:2px solid #aaa;}
  .rank-num{font-size:17px;font-weight:700;color:#333;width:18px;text-align:center;}
  .rank-num.gold{color:#d4a017;}
  .avatar{width:42px;height:42px;border-radius:50%;background:#bbb;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;}
  .info{flex:1;}
  .info .name{font-size:14px;font-weight:700;color:#222;}
  .info .pts{font-size:12px;color:#555;}
  .medal{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
  .medal.gold{background:#ffd700;}
  .medal.silver{background:#c0c0c0;}
  .medal.bronze{background:#cd7f32;}
  .medal-num{font-size:13px;font-weight:900;}
  .footer{background:#2e7d32;padding:12px 16px;display:flex;align-items:center;gap:12px;}
  .footer-avatar{width:44px;height:44px;border-radius:50%;background:#1b5e20;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;}
  .footer-info .name{font-size:15px;font-weight:700;color:#fff;}
  .footer-info .rank{font-size:13px;color:#a5d6a7;}
  .footer-exp{margin-left:auto;text-align:right;}
  .footer-exp .label{font-size:12px;color:#a5d6a7;}
  .footer-exp .val{font-size:22px;font-weight:700;color:#fff;}
</style>

<div class="leaderboard-popup">
  <div class="popup-body">
    <div class="header">
      <div class="bar-icon"><span></span><span></span><span></span></div>
      <h2>ตารางอันดับ</h2>
    </div>
    <button class="close-btn" onclick="window.closePopup()">
      <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
    <div class="list">
      <div class="row">
        <span class="rank-num gold">1</span>
        <div class="avatar">🦊</div>
        <div class="info"><div class="name">green_hero_01</div><div class="pts">150 แต้ม</div></div>
        <div class="medal gold"><span class="medal-num" style="color:#7a5800;">①</span></div>
      </div>
      <div class="row">
        <span class="rank-num">2</span>
        <div class="avatar">🐔</div>
        <div class="info"><div class="name">สมชายสายรักษ์โลก</div><div class="pts">117 แต้ม</div></div>
        <div class="medal silver"><span class="medal-num" style="color:#555;">②</span></div>
      </div>
      <div class="row">
        <span class="rank-num">3</span>
        <div class="avatar">🐷</div>
        <div class="info"><div class="name">Technoblade</div><div class="pts">60 แต้ม</div></div>
        <div class="medal bronze"><span class="medal-num" style="color:#5c3000;">③</span></div>
      </div>
      <div class="row active">
        <span class="rank-num">4</span>
        <div class="avatar">🐱</div>
        <div class="info"><div class="name">ชอบแมว</div><div class="pts">45 แต้ม</div></div>
      </div>
    </div>
  </div>
  <div class="footer">
    <div class="footer-avatar">🐱</div>
    <div class="footer-info">
      <div class="name">ชอบแมว (คุณ)</div>
      <div class="rank">อันดับที่ 4</div>
    </div>
    <div class="footer-exp">
      <div class="label">EXP ของคุณ</div>
      <div class="val">45</div>
    </div>
  </div>
</div>

console.log("Hello")
</script>
